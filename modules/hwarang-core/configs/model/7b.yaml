# Hwarang 7B 모델 설정
# 한국어 최적화 + 코드 생성에 적합
# 베이스: LLaMA-2 7B 아키텍처 + 한국어 토크나이저

vocab_size: 64000          # 한국어 최적화 토크나이저 (영어 32k → 64k)
hidden_size: 4096
intermediate_size: 11008   # SwiGLU: hidden_size × 2.687
num_hidden_layers: 32
num_attention_heads: 32
num_key_value_heads: 8     # GQA: 4:1 비율로 KV 캐시 75% 절감
max_position_embeddings: 4096
rms_norm_eps: 1.0e-5
rope_theta: 10000.0
attention_dropout: 0.0
hidden_dropout: 0.0
tie_word_embeddings: false
initializer_range: 0.02

# 특수 토큰
pad_token_id: 0
bos_token_id: 1
eos_token_id: 2
