# 7B 모델 사전학습 설정
# H100 × 8 환경 기준
# 예상 비용: ~800만원, 시간: ~1주

# Optimization
learning_rate: 3.0e-4
weight_decay: 0.1
max_grad_norm: 1.0
adam_beta1: 0.9
adam_beta2: 0.95
adam_eps: 1.0e-8

# Schedule
warmup_steps: 2000
max_steps: 100000           # ~100B 토큰 학습
lr_scheduler: cosine

# Batching (H100 80GB 기준)
batch_size: 4               # GPU당
gradient_accumulation_steps: 8  # 실효 배치 = 4 × 8 × 8GPU = 256
num_workers: 8

# Checkpointing
save_steps: 2000
eval_steps: 1000
log_steps: 10
output_dir: ./checkpoints/pretrain_7b

# Hardware
device: cuda
dtype: bfloat16             # H100/A100은 bf16 권장
compile_model: true         # PyTorch 2.x compile (속도 ↑)

# 분산 학습
distributed_strategy: fsdp  # FSDP for 7B+ models
fsdp_sharding: full         # full / hybrid / no_shard
mixed_precision: bf16
