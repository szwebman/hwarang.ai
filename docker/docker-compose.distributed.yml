# 다중 서버 분산 배포 설정
#
# 아키텍처:
#   Client → API Server (로드밸런서) → Redis Queue → Worker 1 (GPU)
#                                                  → Worker 2 (GPU)
#                                                  → Worker N (GPU)
#
# 사용법:
#   # Worker 3대로 시작
#   docker compose -f docker/docker-compose.distributed.yml up --scale worker=3
#
#   # Worker 추가 (무중단)
#   docker compose -f docker/docker-compose.distributed.yml up --scale worker=5 --no-recreate

services:
  # ========== 인프라 ==========
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hwarang
      POSTGRES_USER: hwarang
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hwarang_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hwarang"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 1gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ========== API Server (로드밸런서 역할) ==========
  # 모델을 로드하지 않음. Redis를 통해 Worker에게 요청 위임.
  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8000"
    environment:
      HWARANG_DISTRIBUTED: "true"
      HWARANG_REDIS_URL: redis://redis:6379
      HWARANG_DATABASE_URL: postgresql+asyncpg://hwarang:${DB_PASSWORD:-hwarang_dev}@postgres/hwarang
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      replicas: 2  # API 서버도 여러 대 가능 (stateless)
    # GPU 불필요 (추론하지 않음)

  # ========== Worker Nodes (GPU 추론 서버) ==========
  # 실제 모델을 로드하고 추론을 수행.
  # --scale worker=N 으로 동적 확장 가능.
  worker:
    build:
      context: ..
      dockerfile: docker/worker.Dockerfile
    environment:
      REDIS_URL: redis://redis:6379
      MODEL_PATH: /models/hwarang-small
      MODEL_ID: hwarang-small
      DEVICE: auto
      DTYPE: bfloat16
    volumes:
      - model-data:/models
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      replicas: 2  # 기본 Worker 2대 (--scale로 변경 가능)
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ========== Web UI ==========
  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    ports:
      - "3000:3000"
    environment:
      HWARANG_API_URL: http://api:8000
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-change-me}
    depends_on:
      - api

  # ========== 모니터링 (선택) ==========
  # Redis 모니터링 UI
  redis-commander:
    image: rediscommander/redis-commander:latest
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      - redis
    profiles:
      - monitoring

volumes:
  pgdata:
  model-data:
