services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: hwarang
      POSTGRES_USER: hwarang
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hwarang_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hwarang"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8000"
    environment:
      HWARANG_DATABASE_URL: postgresql+asyncpg://hwarang:${DB_PASSWORD:-hwarang_dev}@postgres/hwarang
      HWARANG_REDIS_URL: redis://redis:6379
      HWARANG_MODEL_PATH: /models/hwarang-small
      HWARANG_DEFAULT_MODEL: hwarang-small
      HWARANG_DEVICE: auto
    volumes:
      - model-data:/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  web:
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    ports:
      - "3000:3000"
    environment:
      HWARANG_API_URL: http://api:8000
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-secret-change-me}
    depends_on:
      - api

volumes:
  pgdata:
  model-data:
