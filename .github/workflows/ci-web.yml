name: CI - Web

on:
  push:
    paths:
      - "modules/hwarang-web/**"
  pull_request:
    paths:
      - "modules/hwarang-web/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install dependencies
        run: cd modules/hwarang-web && pnpm install

      - name: Lint
        run: cd modules/hwarang-web && pnpm lint

      - name: Build
        run: cd modules/hwarang-web && pnpm build

      - name: Test
        run: cd modules/hwarang-web && pnpm test
