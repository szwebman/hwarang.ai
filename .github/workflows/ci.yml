name: Hwarang AI CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ───────── 웹 (Next.js) ──────────
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modules/hwarang-web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test || true

  # ───────── 관리자 (Next.js) ──────
  admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modules/hwarang-admin
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: npx prisma generate
      - run: pnpm build

  # ───────── AI 코어 (Python) ──────
  core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modules/hwarang-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install poetry
      - run: poetry install --no-root
      - run: poetry run pytest tests/ || true

  # ───────── 블록체인 (Solidity) ───
  blockchain:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modules/hwarang-blockchain
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - run: npm install
      - run: npx hardhat compile

  # ───────── 배포 (main만) ─────────
  deploy:
    needs: [web, admin, core]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to server
        run: |
          echo "배포 대상: hwarang.ai + admin.hwarang.ai"
          # SSH 배포 또는 Docker 배포
          # ssh deploy@server "cd /home/perseismore/hwarang.ai && git pull && ./deploy.sh"
