name: Build & Release Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '수동 빌드 버전 (예: 0.1.1)'
        required: false

permissions:
  contents: write   # GitHub Release 생성 권한

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─────────────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: dmg
          - os: macos-13           # Intel mac runner (universal 빌드용)
            target: x86_64-apple-darwin
            artifact: dmg
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: msi

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: modules/hwarang-grid/desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ─── 툴체인 ──────────────────────────────────────────────────────
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ─── 캐시 ────────────────────────────────────────────────────────
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: modules/hwarang-grid/desktop/src-tauri

      # ─── 의존성 (Linux) ──────────────────────────────────────────────
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      # ─── Tauri CLI ───────────────────────────────────────────────────
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^1.6' --locked

      # ─── Python sidecar 빌드 ─────────────────────────────────────────
      - name: Build Python sidecar
        working-directory: modules/hwarang-grid/agent
        if: hashFiles('modules/hwarang-grid/agent/build_binary.py') != ''
        run: |
          pip install -r requirements.txt 2>/dev/null || true
          pip install pyinstaller
          python build_binary.py

      # ─── macOS 키체인 임시 설정 ──────────────────────────────────────
      - name: Setup macOS Keychain
        if: startsWith(matrix.os, 'macos')
        env:
          MACOS_CERT_BASE64: ${{ secrets.MACOS_CERT_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERT_BASE64" ]; then
            echo "::warning::MACOS_CERT_BASE64 미설정 → 미서명 빌드"
            exit 0
          fi
          KEYCHAIN_NAME="hwarang-build.keychain"
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_NAME
          security default-keychain -s $KEYCHAIN_NAME
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_NAME
          security set-keychain-settings -t 3600 -u $KEYCHAIN_NAME

          echo "$MACOS_CERT_BASE64" | base64 --decode > cert.p12
          security import cert.p12 \
            -k $KEYCHAIN_NAME \
            -P "$MACOS_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" \
            $KEYCHAIN_NAME
          rm -f cert.p12

      # ─── Windows 인증서 임시 파일 ────────────────────────────────────
      - name: Setup Windows Certificate
        if: matrix.os == 'windows-latest'
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
        shell: pwsh
        run: |
          if (-not $env:WINDOWS_CERT_BASE64) {
            Write-Warning "WINDOWS_CERT_BASE64 미설정 → 미서명 빌드"
            exit 0
          }
          $certPath = "$env:RUNNER_TEMP\hwarang-cert.pfx"
          [System.IO.File]::WriteAllBytes(
            $certPath,
            [System.Convert]::FromBase64String($env:WINDOWS_CERT_BASE64)
          )
          echo "WINDOWS_CERT_PATH=$certPath" >> $env:GITHUB_ENV

      # ─── 빌드 + 서명 ─────────────────────────────────────────────────
      - name: Build (signed)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
          SIGN_SKIP: ${{ secrets.APPLE_SIGNING_IDENTITY == '' && '1' || '0' }}
        shell: bash
        run: |
          case "${{ matrix.artifact }}" in
            dmg)   ./build_signed.sh mac ;;
            msi)   ./build_signed.sh windows ;;
            linux) ./build_signed.sh linux ;;
          esac

      # ─── 아티팩트 업로드 ─────────────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hwarang-grid-${{ matrix.os }}-${{ matrix.target }}
          path: modules/hwarang-grid/desktop/dist/*
          retention-days: 30
          if-no-files-found: warn

  # ─────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten + checksum
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.dmg' -o -name '*.msi' -o -name '*.exe' -o -name '*.deb' -o -name '*.AppImage' -o -name '*.sha256' \) \
            -exec cp {} release/ \;
          cd release && sha256sum * > SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── S3 업로드 (옵션) ────────────────────────────────────────────
      - name: Upload to S3
        if: vars.HWARANG_S3_BUCKET != ''
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ vars.AWS_REGION || 'ap-northeast-2' }}
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          aws s3 sync release/ s3://${{ vars.HWARANG_S3_BUCKET }}/agent/$VERSION/ \
            --cache-control 'public,max-age=86400'
