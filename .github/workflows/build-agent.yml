name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^1"

      - name: Build macOS (Universal)
        working-directory: modules/hwarang-grid/desktop
        run: |
          cargo tauri build --target universal-apple-darwin 2>/dev/null || cargo tauri build

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: modules/hwarang-grid/desktop/src-tauri/target/release/bundle/dmg/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^1"

      - name: Build Windows
        working-directory: modules/hwarang-grid/desktop
        run: cargo tauri build

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: |
            modules/hwarang-grid/desktop/src-tauri/target/release/bundle/nsis/*.exe
            modules/hwarang-grid/desktop/src-tauri/target/release/bundle/msi/*.msi

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^1"

      - name: Build Linux
        working-directory: modules/hwarang-grid/desktop
        run: cargo tauri build

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: |
            modules/hwarang-grid/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            modules/hwarang-grid/desktop/src-tauri/target/release/bundle/deb/*.deb

  release:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Hwarang Grid Agent ${{ github.ref_name }}"
          body: |
            ## 화랑 Grid Agent ${{ github.ref_name }}

            GPU 공유 네트워크에 참여하여 AI 학습에 기여하고 HWR 코인을 받으세요.

            ### 다운로드
            - **macOS**: `.dmg` 파일 다운로드 → 열기 → Applications에 드래그
            - **Windows**: `.exe` 파일 다운로드 → 실행 → 설치
            - **Linux**: `.AppImage` 파일 다운로드 → `chmod +x` → 실행
          files: |
            macos-dmg/*
            windows-exe/*
            linux-appimage/*
