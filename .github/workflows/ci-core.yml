name: CI - Core

on:
  push:
    paths:
      - "modules/hwarang-core/**"
      - "packages/hwarang-shared/**"
  pull_request:
    paths:
      - "modules/hwarang-core/**"
      - "packages/hwarang-shared/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: |
          cd packages/hwarang-shared && poetry install
          cd ../../modules/hwarang-core && poetry install

      - name: Lint
        run: cd modules/hwarang-core && poetry run ruff check src/

      - name: Test
        run: cd modules/hwarang-core && poetry run pytest -v
