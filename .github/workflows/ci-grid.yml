name: CI - Grid Agent

on:
  push:
    paths:
      - "modules/hwarang-grid/**"
  pull_request:
    paths:
      - "modules/hwarang-grid/**"

jobs:
  python-agent:
    name: Python agent smoke
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: modules/hwarang-grid/agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: pip install -e .
      - name: Compile check
        run: python -m compileall -q .
      - name: CLI help
        run: python cli.py --help
      - name: Tests (if present)
        run: |
          if [ -d tests ]; then
            pip install pytest
            pytest tests/ || true
          else
            echo "tests/ 없음 — skip"
          fi

  tauri-desktop:
    name: Tauri desktop check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: modules/hwarang-grid/desktop/src-tauri
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: modules/hwarang-grid/desktop/src-tauri
      - name: Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf
      - name: Cargo check
        run: cargo check --all-targets
      - name: Cargo clippy
        run: cargo clippy --all-targets -- -D warnings || true
