# 화랑 그리드 CLI 단독 바이너리 릴리즈 워크플로우
# ──────────────────────────────────────────────────────────────────────
# 헤드리스 서버 / Docker / SSH 환경 사용자를 위해 PyInstaller 단일
# 실행파일 (`hwarang-agent`) 을 5개 플랫폼에 대해 빌드 + GitHub Release
# 자산으로 업로드한다.
#
# GUI 인스톨러 (.dmg / .msi / .deb) 는 build-agent.yml 이 별도로 담당.
# 이 워크플로우는 CLI 바이너리 한 개만 다룬다.
# ──────────────────────────────────────────────────────────────────────

name: Release Grid CLI

on:
  push:
    tags:
      - 'grid-v*'        # 예: grid-v1.0.0 → 릴리즈 자동 생성/업로드
  release:
    types: [published]   # GitHub UI 에서 Release 수동 생성 시
  workflow_dispatch:     # 수동 트리거 (디버깅용 — Release 업로드 X, artifact 만)

permissions:
  contents: write        # GitHub Release 자산 업로드 권한

jobs:
  build:
    name: Build CLI (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact_name: hwarang-agent-linux-x86_64
            ext: ''
          # ARM Linux 는 GitHub-hosted runner 가 베타 (ubuntu-22.04-arm).
          # 가용성 검증되면 활성화. 현재는 보수적으로 비활성.
          # - os: ubuntu-22.04-arm
          #   target: aarch64-unknown-linux-gnu
          #   artifact_name: hwarang-agent-linux-arm64
          #   ext: ''
          - os: macos-14
            target: aarch64-apple-darwin
            artifact_name: hwarang-agent-macos-arm64
            ext: ''
          - os: macos-13
            target: x86_64-apple-darwin
            artifact_name: hwarang-agent-macos-x86_64
            ext: ''
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            artifact_name: hwarang-agent-windows-x86_64.exe
            ext: '.exe'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ─── 빌드 의존성 설치 ──────────────────────────────────────────
      # CLI-only 빌드: torch / transformers 등 무거운 ML 의존성 제외.
      # build_binary.py 의 OPTIONAL_IMPORTS 가 graceful 하게 처리하므로
      # 사용자가 필요시 별도 설치하면 된다.
      - name: Install build deps
        working-directory: modules/hwarang-grid/agent
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install "pyinstaller>=6.0"
          pip install httpx pyyaml psutil
          # 패키지 자체 (cli.py 등) 진입점 보장
          pip install -e . || true

      # ─── PyInstaller 빌드 ─────────────────────────────────────────
      - name: Build PyInstaller binary
        working-directory: modules/hwarang-grid/agent
        shell: bash
        run: python build_binary.py --no-copy --skip-verify

      # ─── 산출물 이름 변경 ─────────────────────────────────────────
      - name: Rename for release
        shell: bash
        working-directory: modules/hwarang-grid/agent/dist
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv hwarang-agent.exe "${{ matrix.artifact_name }}"
          else
            mv hwarang-agent "${{ matrix.artifact_name }}"
            chmod +x "${{ matrix.artifact_name }}"
          fi
          ls -lh "${{ matrix.artifact_name }}"

      # ─── macOS 코드사이닝 + 공증 (선택) ───────────────────────────
      # APPLE_CERT_BASE64 / APPLE_CERT_PASSWORD / APPLE_TEAM_ID secrets
      # 가 설정되면 활성화. 미설정 시 unsigned 바이너리 — 사용자가
      # `xattr -d com.apple.quarantine hwarang-agent` 로 Gatekeeper 우회.
      #
      # 참고: modules/hwarang-grid/desktop/CODESIGN.md
      #       modules/hwarang-grid/desktop/build_signed.sh
      #
      # - name: Codesign macOS binary
      #   if: runner.os == 'macOS' && env.APPLE_CERT_BASE64 != ''
      #   env:
      #     APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
      #     APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
      #     APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      #     APPLE_ID: ${{ secrets.APPLE_ID }}
      #     APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      #   working-directory: modules/hwarang-grid/agent/dist
      #   run: |
      #     # 1) keychain 생성 + cert import
      #     # 2) codesign --force --sign "Developer ID Application: ..." \
      #     #      --options runtime --timestamp "${{ matrix.artifact_name }}"
      #     # 3) ditto -c -k --keepParent ... .zip
      #     # 4) xcrun notarytool submit ... --wait
      #     # 5) (바이너리는 stapling 불가 — 공증만)
      #     echo "see desktop/build_signed.sh for reference"

      # ─── Windows 코드사이닝 (선택) ────────────────────────────────
      # WINDOWS_CERT_BASE64 / WINDOWS_CERT_PASSWORD secrets 필요.
      # - name: Codesign Windows binary
      #   if: runner.os == 'Windows' && env.WINDOWS_CERT_BASE64 != ''
      #   env:
      #     WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
      #     WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
      #   shell: pwsh
      #   run: |
      #     # signtool sign /f cert.pfx /p $env:WINDOWS_CERT_PASSWORD ...

      # ─── 체크섬 ───────────────────────────────────────────────────
      - name: Create checksum
        shell: bash
        working-directory: modules/hwarang-grid/agent/dist
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${{ matrix.artifact_name }}" > "${{ matrix.artifact_name }}.sha256"
          else
            shasum -a 256 "${{ matrix.artifact_name }}" > "${{ matrix.artifact_name }}.sha256"
          fi
          cat "${{ matrix.artifact_name }}.sha256"

      # ─── GitHub Release 업로드 (tag / release 트리거 시) ──────────
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/grid-v') || github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            modules/hwarang-grid/agent/dist/${{ matrix.artifact_name }}
            modules/hwarang-grid/agent/dist/${{ matrix.artifact_name }}.sha256
          token: ${{ secrets.GITHUB_TOKEN }}
          fail_on_unmatched_files: false
          generate_release_notes: true
          body: |
            ## 화랑 그리드 CLI 에이전트 ${{ github.ref_name }}

            헤드리스 서버 / Docker / SSH 환경용 단일 실행파일.
            GUI 인스톨러는 별도 릴리즈 (`v*` 태그) 에서 제공.

            ### 설치 (한 줄)

            ```bash
            curl -fsSL https://hwarang.ai/install-grid.sh | bash
            ```

            ### 수동 설치

            자기 OS 에 맞는 바이너리 다운로드 → 실행 권한 → PATH 이동:

            ```bash
            # Linux x86_64
            curl -L -o hwarang-agent \
              https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/hwarang-agent-linux-x86_64
            chmod +x hwarang-agent
            sudo mv hwarang-agent /usr/local/bin/

            # macOS Apple Silicon
            curl -L -o hwarang-agent \
              https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/hwarang-agent-macos-arm64
            chmod +x hwarang-agent
            xattr -d com.apple.quarantine hwarang-agent  # Gatekeeper 우회
            sudo mv hwarang-agent /usr/local/bin/

            # macOS Intel
            curl -L -o hwarang-agent \
              https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/hwarang-agent-macos-x86_64
            chmod +x hwarang-agent
            xattr -d com.apple.quarantine hwarang-agent
            sudo mv hwarang-agent /usr/local/bin/
            ```

            Windows (PowerShell):

            ```powershell
            Invoke-WebRequest `
              -Uri "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/hwarang-agent-windows-x86_64.exe" `
              -OutFile "$env:USERPROFILE\hwarang-agent.exe"
            ```

            ### 첫 사용

            ```bash
            hwarang-agent login    # 다른 기기 브라우저로 인증
            hwarang-agent daemon   # 백그라운드 실행
            hwarang-agent status   # 현황 확인
            ```

            ### 무결성 검증

            각 바이너리에 `.sha256` 첨부.
            ```bash
            sha256sum -c hwarang-agent-linux-x86_64.sha256
            # macOS: shasum -a 256 -c hwarang-agent-macos-arm64.sha256
            ```

      # ─── workflow_dispatch: artifact 로만 업로드 (디버깅) ─────────
      - name: Upload as workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            modules/hwarang-grid/agent/dist/${{ matrix.artifact_name }}
            modules/hwarang-grid/agent/dist/${{ matrix.artifact_name }}.sha256
          retention-days: 14
          if-no-files-found: error
